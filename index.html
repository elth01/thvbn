<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Endereço - CEP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2563eb; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #2563eb; outline: none; }
        .resultado { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; display: none; }
        .info { margin-bottom: 10px; font-size: 14px; color: #444; }
        .label { font-weight: bold; color: #2563eb; text-transform: uppercase; font-size: 12px; display: block; }
        .error { color: #dc2626; font-size: 13px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📍 Busca CEP</h2>
    <label for="cep" style="font-size: 13px; margin-bottom: 5px; display: block;">Digite o CEP (Ex: 01001-000)</label>
    <input type="text" id="cep" placeholder="00000-000" maxlength="9">
    <div id="error" class="error">CEP não encontrado ou inválido.</div>

    <div id="resultado" class="resultado">
        <div class="info"><span class="label">Logradouro</span> <span id="rua"></span></div>
        <div class="info"><span class="label">Bairro</span> <span id="bairro"></span></div>
        <div class="info"><span class="label">Cidade</span> <span id="cidade"></span></div>
        <div class="info"><span class="label">Estado</span> <span id="uf"></span></div>
        <div class="info"><span class="label">CEP</span> <span id="cep-res"></span></div>
    </div>
</div>

<script>
    const inputCep = document.getElementById('cep');
    const resultadoDiv = document.getElementById('resultado');
    const errorDiv = document.getElementById('error');

    // Máscara e gatilho de busca
    inputCep.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, ''); // Remove letras
        if (val.length > 5) val = val.replace(/^(\d{5})(\d)/, '$1-$2');
        e.target.value = val;

        if (val.length === 9) {
            pesquisarCep(val.replace('-', ''));
        } else {
            resultadoDiv.style.display = 'none';
        }
    });

    async function pesquisarCep(cep) {
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();

            if (data.erro) {
                errorDiv.style.display = 'block';
                resultadoDiv.style.display = 'none';
            } else {
                errorDiv.style.display = 'none';
                resultadoDiv.style.display = 'block';
                document.getElementById('rua').innerText = data.logradouro;
                document.getElementById('bairro').innerText = data.bairro;
                document.getElementById('cidade').innerText = data.localidade;
                document.getElementById('uf').innerText = data.uf;
                document.getElementById('cep-res').innerText = data.cep;
            }
        } catch (e) {
            console.log("Erro ao conectar na API");
        }
    }
</script>

</body>
</html>
